<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historical Map of Rome</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }

    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      pointer-events: none;
    }

    #era-controls {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(0, 0, 0, 0.7);
      padding: 12px 24px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      pointer-events: all;
    }

    #era-controls button {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }

    #era-controls button:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    #era-info {
      text-align: center;
      min-width: 200px;
    }

    #era-name {
      color: #e0d4b8;
      font-size: 18px;
      font-weight: 600;
    }

    #era-dates {
      color: #a0a0b0;
      font-size: 12px;
      margin-top: 2px;
    }

    #landmark-tooltip {
      position: absolute;
      display: none;
      background: rgba(0, 0, 0, 0.8);
      color: #e0d4b8;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      pointer-events: none;
      white-space: nowrap;
      border: 1px solid rgba(224, 212, 184, 0.3);
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #e0d4b8;
      font-size: 20px;
    }

    .landmark-label {
      position: absolute;
      color: #ffe8b0;
      font-size: 11px;
      font-weight: 500;
      text-shadow: 0 0 4px rgba(0,0,0,0.9), 0 0 8px rgba(0,0,0,0.6);
      pointer-events: none;
      transform: translate(-50%, -100%);
      white-space: nowrap;
    }

    .landmark-label::after {
      content: '';
      display: block;
      width: 4px;
      height: 4px;
      background: #ffe8b0;
      border-radius: 50%;
      margin: 2px auto 0;
    }
  </style>
</head>
<body>
  <div id="loading">Loading historical map…</div>
  <div id="ui-overlay">
    <div id="era-controls">
      <button id="btn-prev">◀ Previous Era</button>
      <div id="era-info">
        <div id="era-name">Loading…</div>
        <div id="era-dates"></div>
      </div>
      <button id="btn-next">Next Era ▶</button>
    </div>
    <div id="landmark-tooltip"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
